<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Orders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f8ff; font-family: 'Arial', sans-serif; }
        h1 { color: #2980b9; text-align: center; margin-top: 20px; }
        .card { border-radius: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .order-total { font-weight: bold; color: #e67e22; }
        ul.list-group { margin-bottom: 0; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h1>🍳 Orders 🍽️</h1>

    <script>
        // Refresh page every 5 seconds
        setTimeout(function(){ window.location.reload(); }, 5000);
    </script>

    {% for order in orders %}
        <div class="card mb-3 p-3">
            <h4>Order #{{ order.id }}</h4>
            <p><small class="text-muted">Time: {{ order.created_at }}</small></p>
            <ul class="list-group">
                {% for item in order.orderitem_set.all %}
                    <li class="list-group-item d-flex justify-content-between">
                        {{ item.item.name }} x {{ item.quantity }}
                        <span>${{ item.subtotal }}</span>
                    </li>
                {% endfor %}
            </ul>
            <h5 class="order-total mt-2">Total: ${{ order.total_price }}</h5>
        </div>
    {% endfor %}
</div>

</body>
</html>
