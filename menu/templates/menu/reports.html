<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow">

        <h1 class="text-2xl font-bold mb-6">📊 Reports Center</h1>

        <p class="text-gray-600 mb-6">
            Choose a report type to download your sales data.
        </p>

        <div class="space-y-4">

            <!-- DAILY -->
            <a href="/export/?period=daily"
               class="block bg-blue-500 text-white p-4 rounded-lg text-center hover:bg-blue-600">
                📅 Download Daily Report
            </a>

            <!-- MONTHLY -->
            <a href="/export/?period=monthly"
               class="block bg-green-500 text-white p-4 rounded-lg text-center hover:bg-green-600">
                📆 Download Monthly Report
            </a>

            <!-- YEARLY -->
            <a href="/export/?period=yearly"
               class="block bg-purple-500 text-white p-4 rounded-lg text-center hover:bg-purple-600">
                📊 Download Yearly Report
            </a>

        </div>

    </div>

</body>
</html>
