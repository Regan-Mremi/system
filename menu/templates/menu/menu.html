<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cafe Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff8f0; font-family: 'Arial', sans-serif; }
        h1 { color: #d35400; text-align: center; margin-top: 20px; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .quantity { width: 60px; }
        button { width: 100%; font-size: 1.2em; }
        #total { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h1>🍔Swahili Amell Buffet Menu 🍹</h1>

    <form method="POST" action="/order/">
        {% csrf_token %}
        <div class="row g-3">
            {% for item in items %}
                <div class="col-sm-6 col-md-4">
                    <div class="card p-3">
                        <h5>{{ item.name }}</h5>
                        <p class="text-muted">${{ item.price }}</p>
                        <input type="number" name="item_{{ item.id }}" value="0" min="0"
                               data-price="{{ item.price }}" class="form-control quantity">
                    </div>
                </div>
            {% endfor %}
        </div>

        <div class="mt-4 text-center">
            <h3>Total: $<span id="total">0.00</span></h3>
            <button type="submit" class="btn btn-success btn-lg mt-2">✅ Confirm Order</button>
        </div>
    </form>
</div>

<script>
    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.quantity').forEach(function(input){
            let price = parseFloat(input.dataset.price);
            let qty = parseInt(input.value) || 0;
            total += price * qty;
        });
        document.getElementById('total').innerText = total.toFixed(2);
    }

    document.querySelectorAll('.quantity').forEach(function(input){
        input.addEventListener('input', updateTotal);
    });

    updateTotal(); // initialize total

 
</script>

</body>
</html>
